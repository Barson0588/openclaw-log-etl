name: Dependency Update Check

on:
  schedule:
    # 每周三早上 8:00 运行
    - cron: '0 0 * * 3'
  workflow_dispatch:

jobs:
  update-deps:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install pip-check-updates
        run: pip install pip-check-updates

      - name: Check for dependency updates
        run: python -m pip_check_updates --auto-approve --indent 0 -u --update-file requirements.txt

      - name: Check if requirements.txt changed
        id: diff
        run: |
          if git diff --quiet requirements.txt; then
            echo "changed=false" >> $GITHUB_OUTPUT
          else
            echo "changed=true" >> $GITHUB_OUTPUT
          fi

      - name: Create Pull Request
        if: steps.diff.outputs.changed == 'true'
        uses: peter-evans/create-pull-request@v7
        with:
          commit-message: 'chore(deps): update Python dependencies'
          title: '📦 chore(deps): update Python dependencies'
          body: |
            ## 🔄 自动依赖更新

            由 GitHub Actions 自动检测到的 Python 依赖更新。

            请 review 后合并～

            ---
            🤖 Auto-generated by dependency-update workflow
          branch: chore/update-deps
          delete-branch: true
          labels: dependencies
